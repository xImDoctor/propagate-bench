# base parameters
n_agents: 5
m_informed: 2
share_cost: 0.01
starting_capital: 1.0
max_rounds: 6
seed: 42

# LLM and sampling
# model, api_type: fake - for pre-coded run
model: qwen2.5:3b
#model: qwen3.5:4b
#model: gemma3:4b
api_type: ollama
temperature: 0.7
top_p: 1.0

# Prompt template, matcher logic, payment mode
template_version: v1_baseline
matcher: first_come
payment_mode: teacher_pays